<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ActBayan — Login</title>
 
</head>
<body>

<div class="wrapper">
  <!-- Left branding panel -->
  <div class="panel-left">
    <div class="brand">ActBayan</div>
    <div class="tagline">
      <h2>Your community,<br>connected.</h2>
      <p>Sign in to access your account and stay in touch with what matters.</p>
      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <!-- Right login form -->
  <div class="panel-right">
    <h3>Welcome back</h3>
    <p class="sub">Sign in with your email or phone number</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label for="e">Email or Phone</label>
        <input type="text" id="e" name="e" placeholder="you@example.com" autocomplete="username" />
      </div>
      <div class="field">
        <label for="pass">Password</label>
        <input type="password" id="pass" name="pass" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>

    <div class="divider">or</div>

    <p class="footer-link">
      Don't have an account? <a href="/register">Create one</a>
    </p>
  </div>
</div>

</body>
</html>
